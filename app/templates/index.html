<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testeur IA - Offres d'emploi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    
    <style>
        .ql-editor { min-height: 200px; font-size: 15px; }
        .spinner-border { display: none; } /* Caché par défaut */
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4 text-center">🤖 Extracteur d'Offres d'Emploi (Gemini)</h2>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">1. Extraire depuis un Fichier (PDF/Image)</h5>
                </div>
                <div class="card-body">
                    <form id="fileForm">
                        <div class="mb-3">
                            <input class="form-control" type="file" id="fileInput" accept=".pdf, .png, .jpg, .jpeg, .webp" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <span class="spinner-border spinner-border-sm me-2" id="fileSpinner" role="status"></span>
                            Analyser le fichier
                        </button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-secondary text-white">
                    <h5 class="card-title mb-0">2. Extraire depuis un Texte brut</h5>
                </div>
                <div class="card-body">
                    <form id="textForm">
                        <div class="mb-3">
                            <textarea class="form-control" id="textInput" rows="6" placeholder="Collez l'offre d'emploi ici..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-secondary w-100">
                            <span class="spinner-border spinner-border-sm me-2" id="textSpinner" role="status"></span>
                            Analyser le texte
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">Résultat Structuré</h5>
                    <span class="badge bg-light text-dark" id="statusBadge">En attente</span>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Titre du poste</label>
                            <input type="text" class="form-control" id="resTitle" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nom de l'entreprise</label>
                            <input type="text" class="form-control" id="resCompany" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Type de contrat</label>
                            <input type="text" class="form-control" id="resContract" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ville(s)</label>
                            <input type="text" class="form-control" id="resCities" readonly>
                        </div>
                        
                        <div class="col-12 mt-3">
                            <label class="form-label fw-bold">Description de l'offre</label>
                            <div id="editor"></div>
                        </div>

                        <div class="col-12 mt-3">
                            <label class="form-label fw-bold">JSON Brut (Pour debug)</label>
                            <textarea class="form-control font-monospace" id="resJson" rows="5" readonly style="font-size: 12px;"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    // 1. Initialisation de l'éditeur de texte riche (Quill)
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    // L'URL de base de ton API FastAPI
    const API_BASE_URL = "http://127.0.0.1:4000/api/v1/ai";

    // 2. Gérer l'envoi du Fichier
    document.getElementById('fileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        await callApi('/extract-job-offer/file', formData, 'fileSpinner');
    });

    // 3. Gérer l'envoi du Texte
    document.getElementById('textForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = document.getElementById('textInput').value;
        if (!text) return;

        const formData = new FormData();
        // Assure-toi d'avoir corrigé ton code Python avec `text: str = Form(...)`
        formData.append("text", text);

        await callApi('/extract-job-offer/text', formData, 'textSpinner');
    });

    // 4. Fonction principale pour appeler l'API et gérer l'affichage
    async function callApi(endpoint, bodyData, spinnerId) {
        const spinner = document.getElementById(spinnerId);
        const statusBadge = document.getElementById('statusBadge');
        
        spinner.style.display = 'inline-block';
        statusBadge.textContent = "Extraction en cours...";
        statusBadge.className = "badge bg-warning text-dark";

        try {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                method: 'POST',
                body: bodyData,
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || "Erreur lors de l'extraction");
            }

            // Remplissage des champs simples
            document.getElementById('resTitle').value = data.title || '';
            document.getElementById('resCompany').value = data.companyName || '';
            document.getElementById('resContract').value = data.contractType || '';
            document.getElementById('resCities').value = (data.workCities || []).join(', ');
            document.getElementById('resJson').value = JSON.stringify(data, null, 2);

            // Conversion du Markdown de la description en HTML et injection dans l'éditeur
            const rawDescription = data.description || '';
            const htmlDescription = marked.parse(rawDescription); // Transforme le Markdown en HTML
            quill.root.innerHTML = htmlDescription;               // Injecte dans Quill

            statusBadge.textContent = "Succès";
            statusBadge.className = "badge bg-success";

        } catch (error) {
            console.error(error);
            alert("Erreur : " + error.message);
            statusBadge.textContent = "Échec";
            statusBadge.className = "badge bg-danger";
        } finally {
            spinner.style.display = 'none';
        }
    }
</script>
</body>
</html>
